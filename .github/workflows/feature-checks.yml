name: Feature Checks

on:
  push:
    branches-ignore:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: App
        run: mvn -B clean package -DskipTests

      - name: Run Tests
        working-directory: App
        run: mvn -B test
