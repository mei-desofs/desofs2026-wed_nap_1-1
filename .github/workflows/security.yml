name: Security Pipeline

on:
  workflow_call:

jobs:
  # Secret Scan
  secret-scan:
    name: Secret Scan - GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST — CodeQL Analysis
  sast-codeql:
    name: SAST - CodeQL Java
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual

      - name: Build Project
        working-directory: App
        run: mvn -B clean package -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java'

  # SCA — OWASP Dependency-Check + SBOM
  sca:
    name: SCA - OWASP Dependency-Check + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure Cached Data Directory Exists
        run: mkdir -p ~/.dependency-check/data

      - name: Cache OWASP Dependency-Check DB
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check/data
          key: dependency-check-${{ runner.os }}
          restore-keys: dependency-check-${{ runner.os }}

      - name: Run OWASP Dependency-Check
        working-directory: App
        run: mvn -B dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: App/target/dependency-check-report.*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom.spdx.json

# DAST + Runtime Log Analysis (IAST Pragmatic Alternative)
  dast-and-runtime-analysis:
    name: DAST & Runtime Log Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Application
        working-directory: App
        run: mvn -B clean package -DskipTests

      # 1. Iniciar a aplicação pura (produção-equivalente) e capturar log
      - name: Start Application
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          AUTH0_ISSUER_URI: https://${{ secrets.AUTH0_DOMAIN }}/
          AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
          SERVER_PORT: 8080
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRINGDOC_API_DOCS_ENABLED: "true"
          SPRINGDOC_SWAGGER_UI_ENABLED: "true"
          APP_RATE_LIMIT_ENABLED: "false"
        run: |
          java -jar App/target/*.jar > runtime_execution.log 2>&1 &
          APP_PID=$!
          echo "Waiting for application to start (PID: $APP_PID)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application is healthy."
              break
            fi
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "Application crashed. Logs:"
              cat runtime_execution.log
              exit 1
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:8080/actuator/health || { echo "App failed to start. Logs:"; cat runtime_execution.log; exit 1; }

      - name: Verify OpenAPI spec is accessible
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v3/api-docs)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /v3/api-docs is not accessible."
            exit 1
          fi

      - name: Get Auth0 M2M Token
        id: get_token
        run: |
          RESPONSE=$(curl -s --request POST \
            --url "https://${{ secrets.AUTH0_DOMAIN }}/oauth/token" \
            --header 'content-type: application/json' \
            --data "{
              \"client_id\": \"${{ secrets.AUTH0_CLIENT_ID }}\",
              \"client_secret\": \"${{ secrets.AUTH0_CLIENT_SECRET }}\",
              \"audience\": \"${{ vars.AUTH0_AUDIENCE }}\",
              \"grant_type\": \"client_credentials\"
            }")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create ZAP Rules File
        run: |
          cat <<'EOF' > rules.tsv
          10015 IGNORE  (Incomplete or No Cache-control Header Set)
          10096 IGNORE  (Timestamp Disclosure)
          10036 IGNORE  (Server Leaks Version Information)
          90005 IGNORE  (Sec-Fetch-Dest Header is Missing)
          10038 IGNORE  (Content Security Policy Header Not Set)
          10021 IGNORE  (X-Content-Type-Options Header Missing)
          40018 IGNORE  (SQL Injection - False Positive: JPA prepared statements)
          6 IGNORE  (Path Traversal - False Positive: /api/movies ID is numeric from database)
          EOF

      # 2. Exercitar a aplicação sob condições reais de ataque
      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'http://localhost:8080/v3/api-docs'
          format: openapi
          fail_action: true
          rules_file_name: 'rules.tsv'
          cmd_options: '-z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement=Bearer\ ${{ steps.get_token.outputs.TOKEN }}"'

      # 3. Analisar os logs conforme descrito na sua metodologia
      - name: Scan Runtime Log for Security Anomalies
        if: always()
        run: |
          echo "=== Scanning runtime execution log for security anomalies ==="
          grep -i -n -C 2 "exception\|error\|unauthorized\|forbidden\|stacktrace\|sql\|injection\|denied" runtime_execution.log > security_anomalies.txt || true
          
          if [ -s security_anomalies.txt ]; then
            echo "⚠️ SECURITY ANOMALIES DETECTED DURING EXECUTION:"
            cat security_anomalies.txt
          else
            echo "✅ No security anomalies detected in runtime logs."
          fi

      # 4. Arquivar para revisão manual (Conforme o seu texto)
      - name: Archive Runtime Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-execution-logs
          path: |
            runtime_execution.log
            security_anomalies.txt
          retention-days: 30