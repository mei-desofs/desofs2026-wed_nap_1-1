name: Security Pipeline

on:
  workflow_call:

jobs:
  # Secret Scan
  secret-scan:
    name: Secret Scan - GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST — CodeQL Analysis
  sast-codeql:
    name: SAST - CodeQL Java
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build Project
        working-directory: App
        run: mvn -B clean package -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java'

  # SCA — OWASP Dependency-Check + SBOM
  sca:
    name: SCA - OWASP Dependency-Check + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache OWASP Dependency-Check DB
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: dependency-check-${{ runner.os }}
          restore-keys: dependency-check-${{ runner.os }}

      - name: Run OWASP Dependency-Check
        working-directory: App
        run: mvn -B dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: App/target/dependency-check-report.*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom.spdx.json

  # DAST — OWASP ZAP
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Application
        working-directory: App
        run: mvn -B clean package -DskipTests

      - name: Start Application
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          SERVER_PORT: 8080
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRINGDOC_API_DOCS_ENABLED: "true"
          SPRINGDOC_SWAGGER_UI_ENABLED: "true"
        run: |
          java -jar App/target/*.jar > app.log 2>&1 &
          echo "Waiting for application to start..."
          curl --retry 30 \
               --retry-delay 5 \
               --retry-connrefused \
               http://localhost:8080/actuator/health
          echo "Application is healthy."

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: 'http://localhost:8080/v3/api-docs'
          format: openapi
          fail_action: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
            report_md.md
