name: Security Pipeline

on:
  workflow_call:

jobs:
  # Secret Scan
  secret-scan:
    name: Secret Scan - GitLeaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST - CodeQL Analysis
  sast-codeql:
    name: SAST - CodeQL Java
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          build-mode: manual

      - name: Build Project
        working-directory: App
        run: mvn -B clean package -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:java'

  # SCA - OWASP Dependency-Check + SBOM
  sca:
    name: SCA - OWASP Dependency-Check + SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ensure Cached Data Directory Exists
        run: mkdir -p ~/.dependency-check/data

      - name: Cache OWASP Dependency-Check DB
        uses: actions/cache@v5
        with:
          path: ~/.dependency-check/data
          key: dependency-check-${{ runner.os }}
          restore-keys: dependency-check-${{ runner.os }}

      - name: Run OWASP Dependency-Check
        working-directory: App
        run: mvn -B dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload Dependency-Check Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: App/target/dependency-check-report.*

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          artifact-name: sbom.spdx.json

# DAST + Runtime Log Analysis (IAST Pragmatic Alternative)
  dast-and-runtime-analysis:
    name: DAST & Runtime Log Analysis
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    # Ephemeral MySQL for hermetic, deterministic DAST runs.
    # Flyway owns the schema (V1..V8); Hibernate stays in `validate`.
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: eMovieShop
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Application
        working-directory: App
        run: mvn -B clean package -DskipTests

      # 1. Iniciar a aplicação pura (produção-equivalente) e capturar log
      - name: Start Application
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/eMovieShop?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          AUTH0_ISSUER_URI: https://${{ secrets.AUTH0_DOMAIN }}/
          AUTH0_AUDIENCE: ${{ vars.AUTH0_AUDIENCE }}
          # Auth0 Management API (UC8 user/role administration).
          # In CI the same M2M used by ZAP also serves the backend Management
          # API calls. Requires `read:users`, `read:roles`, `read:role_members`
          # authorized on the Auth0 Management API for the M2M application.
          AUTH0_MGMT_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_MGMT_AUDIENCE: https://${{ secrets.AUTH0_DOMAIN }}/api/v2/
          AUTH0_MGMT_CLIENT_ID: ${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_MGMT_CLIENT_SECRET: ${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_ROLE_ID_ADMIN: ${{ secrets.AUTH0_ROLE_ID_ADMIN }}
          AUTH0_ROLE_ID_SUPPORT: ${{ secrets.AUTH0_ROLE_ID_SUPPORT }}
          AUTH0_ROLE_ID_CUSTOMER: ${{ secrets.AUTH0_ROLE_ID_CUSTOMER }}
          SERVER_PORT: 8080
          SPRING_JPA_HIBERNATE_DDL_AUTO: validate
          SPRINGDOC_API_DOCS_ENABLED: "true"
          SPRINGDOC_SWAGGER_UI_ENABLED: "true"
        run: |
          java -jar App/target/*.jar > runtime_execution.log 2>&1 &
          APP_PID=$!
          echo "Waiting for application to start (PID: $APP_PID)..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Application is healthy."
              break
            fi
            if ! kill -0 $APP_PID 2>/dev/null; then
              echo "Application crashed. Logs:"
              cat runtime_execution.log
              exit 1
            fi
            echo "Attempt $i/30 - waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:8080/actuator/health || { echo "App failed to start. Logs:"; cat runtime_execution.log; exit 1; }

      - name: Verify OpenAPI spec is accessible
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/v3/api-docs)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /v3/api-docs is not accessible."
            exit 1
          fi

      - name: Get Auth0 M2M Token
        id: get_token
        run: |
          RESPONSE=$(curl -s --request POST \
            --url "https://${{ secrets.AUTH0_DOMAIN }}/oauth/token" \
            --header 'content-type: application/json' \
            --data "{
              \"client_id\": \"${{ secrets.AUTH0_CLIENT_ID }}\",
              \"client_secret\": \"${{ secrets.AUTH0_CLIENT_SECRET }}\",
              \"audience\": \"${{ vars.AUTH0_AUDIENCE }}\",
              \"grant_type\": \"client_credentials\"
            }")
          TOKEN=$(echo $RESPONSE | jq -r '.access_token')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then exit 1; fi
          echo "::add-mask::$TOKEN"
          echo "TOKEN=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create ZAP Rules File
        run: |
          printf '10015\tIGNORE\t(Incomplete or No Cache-control Header Set)\n' > rules.tsv
          printf '10096\tIGNORE\t(Timestamp Disclosure)\n' >> rules.tsv
          printf '10036\tIGNORE\t(Server Leaks Version Information)\n' >> rules.tsv
          printf '90005\tIGNORE\t(Sec-Fetch-Dest Header is Missing)\n' >> rules.tsv
          printf '10038\tIGNORE\t(Content Security Policy Header Not Set)\n' >> rules.tsv
          printf '10021\tIGNORE\t(X-Content-Type-Options Header Missing)\n' >> rules.tsv
          printf '40018\tIGNORE\t(SQL Injection - False Positive: JPA prepared statements)\n' >> rules.tsv
          printf '6\tIGNORE\t(Path Traversal - False Positive: numeric ID)\n' >> rules.tsv

      # 2. Exercitar a aplicação sob condições reais de ataque
      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'http://localhost:8080/v3/api-docs'
          format: openapi
          fail_action: true
          rules_file_name: 'rules.tsv'
          cmd_options: '-z "-config replacer.full_list(0).description=auth -config replacer.full_list(0).enabled=true -config replacer.full_list(0).matchtype=REQ_HEADER -config replacer.full_list(0).matchstr=Authorization -config replacer.full_list(0).regex=false -config replacer.full_list(0).replacement=Bearer\ ${{ steps.get_token.outputs.TOKEN }}"'

      - name: Scan Runtime Log for Security Anomalies
        if: always()
        run: |
          echo "=== Scanning runtime execution log for security anomalies ==="

          echo "--- Unexpected ERRORs (excluding known patterns) ---"
          grep -i " ERROR " runtime_execution.log \
            | grep -v "Http11Processor\|Http11InputBuffer" \
            > critical_errors.txt || true

          echo "--- Authorization failures ---"
          grep -i "Access denied\|Unauthorized\|Forbidden" runtime_execution.log \
            > auth_failures.txt || true

          echo "--- Rate limiting activations ---"
          grep -i "Rate limit exceeded" runtime_execution.log \
            | wc -l | xargs echo "Rate limit triggers:"

          echo "--- Constraint violations (input validation working) ---"
          grep -i "Constraint violation\|Malformed request" runtime_execution.log \
            | wc -l | xargs echo "Rejected malformed inputs:"

          if [ -s critical_errors.txt ]; then
            echo "⚠️ CRITICAL ERRORS DETECTED:"
            cat critical_errors.txt
          else
            echo "✅ No critical errors detected."
          fi

      # 4. Arquivar para revisão manual (Conforme o seu texto)
      - name: Archive Runtime Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: runtime-execution-logs
          path: |
            runtime_execution.log
            security_anomalies.txt
          retention-days: 30