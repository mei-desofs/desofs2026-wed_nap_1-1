services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: emovieshop_backend

    ports:
      - "8080:8080"

    env_file:
      - .env

    restart: unless-stopped

    networks:
      - emovieshop

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  emovieshop:
    driver: bridge