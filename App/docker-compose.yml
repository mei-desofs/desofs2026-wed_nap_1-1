services:

  backend:
    image: emovieshop:latest

    container_name: emovieshop_backend

    ports:
      - "8080:8080"

    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH0_ISSUER_URI: ${AUTH0_ISSUER_URI}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE}
      AUTH0_MGMT_DOMAIN: ${AUTH0_MGMT_DOMAIN}
      AUTH0_MGMT_AUDIENCE: ${AUTH0_MGMT_AUDIENCE}
      AUTH0_MGMT_CLIENT_ID: ${AUTH0_MGMT_CLIENT_ID}
      AUTH0_MGMT_CLIENT_SECRET: ${AUTH0_MGMT_CLIENT_SECRET}
      AUTH0_ROLE_ID_ADMIN: ${AUTH0_ROLE_ID_ADMIN}
      AUTH0_ROLE_ID_SUPPORT: ${AUTH0_ROLE_ID_SUPPORT}
      AUTH0_ROLE_ID_CUSTOMER: ${AUTH0_ROLE_ID_CUSTOMER}

    restart: unless-stopped

    networks:
      - emovieshop

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  emovieshop:
    driver: bridge