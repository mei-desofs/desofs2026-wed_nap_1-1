# eMovieShop Backend - Development Profile

# ---- MySQL (dev instance) ----
spring.datasource.url=jdbc:mysql://localhost:3306/emovieshop_dev?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ---- Auth0 (dev tenant) ----
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://dev-kiwnc36rxn8zsw24.us.auth0.com/}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE:https://emovieshop-api}

# ---- Receipts ----
emovieshop.receipts.directory=${RECEIPTS_DIR:./receipts}

# ---- Logging ----
logging.level.com.emovieshop=DEBUG
