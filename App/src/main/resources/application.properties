# eMovieShop Backend - Application Properties

# ---- Server ----
server.port=8080
server.error.include-stacktrace=never
server.error.include-message=never

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Auth0 / OAuth2 Resource Server ----
# Note: No futuro meter aqui PROD tenance
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://dev-kiwnc36rxn8zsw24.us.auth0.com/}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE:https://emovieshop-api}

# ---- Auth0 Management API (UC8 user/role administration) ----
# Secrets MUST be supplied via environment variables; never commit them.
emovieshop.auth0.management.domain=${AUTH0_MGMT_DOMAIN:dev-kiwnc36rxn8zsw24.us.auth0.com}
emovieshop.auth0.management.audience=${AUTH0_MGMT_AUDIENCE:https://dev-kiwnc36rxn8zsw24.us.auth0.com/api/v2/}
emovieshop.auth0.management.client-id=${AUTH0_MGMT_CLIENT_ID:}
emovieshop.auth0.management.client-secret=${AUTH0_MGMT_CLIENT_SECRET:}
emovieshop.auth0.management.connect-timeout-ms=5000
emovieshop.auth0.management.read-timeout-ms=10000
emovieshop.auth0.management.token-refresh-skew-seconds=60
emovieshop.auth0.management.role-ids.ADMIN=${AUTH0_ROLE_ID_ADMIN:}
emovieshop.auth0.management.role-ids.SUPPORT=${AUTH0_ROLE_ID_SUPPORT:}
emovieshop.auth0.management.role-ids.CUSTOMER=${AUTH0_ROLE_ID_CUSTOMER:}

# ---- Receipt File Configuration ----
emovieshop.receipts.directory=${RECEIPTS_DIR:./receipts}
emovieshop.receipts.max-name-length=100

# ---- Request Size Limits ----
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB
server.tomcat.max-http-form-post-size=1048576

# ---- Tomcat path char relaxation ----
# Auth0 user IDs are of the form "auth0|<hex>". The "|" char is not allowed in
# URI paths per RFC 3986, but Auth0 mints subjects with it by design and clients
# (Postman, curl) typically do not percent-encode it. Relax Tomcat so that path
# segments carrying Auth0 ids are accepted unchanged.
server.tomcat.relaxed-path-chars=|,{,},[,]

# ---- Logging ----
logging.level.com.emovieshop=INFO
logging.level.org.springframework.security=WARN

# ---- Rate Limiting ----
emovieshop.rate-limit.ip.requests-per-minute=300
emovieshop.rate-limit.user.requests-per-minute=120

# ---- CORS ----
security.cors.allowed-origins=*

# ---- Actuator ----
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ---- OpenAPI / Swagger UI ----
# Disabled in production; enabled per-profile (dev/test) for DAST scanning
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false