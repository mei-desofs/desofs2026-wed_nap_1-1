server.port=8081

# MySQL Database
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true

# Logging
logging.level.org.springframework=INFO

# OAuth2
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH0_JWK_SET_URI:}

# Email
spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Auth0
auth0.domain=${AUTH0_DOMAIN:}
auth0.audience=${AUTH0_AUDIENCE:}
auth0.jwk-set-uri=${AUTH0_JWK_SET_URI:}

# App Mail
app.mail.from=${MAIL_FROM:noreply@example.com}
app.mail.from-name=${MAIL_FROM_NAME:DESOFS Movies Store}