# Test profile
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Auth0 JWT for tests (overridden by test security config)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://test.auth0.com/

# Receipts
emovieshop.receipts.directory=${java.io.tmpdir}/emovieshop-test-receipts
emovieshop.receipts.max-name-length=100

# Rate Limiting - relaxed for integration tests
emovieshop.rate-limit.ip.requests-per-minute=10000
emovieshop.rate-limit.user.requests-per-minute=10000
