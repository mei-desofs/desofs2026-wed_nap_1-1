<?xml version="1.0" encoding="us-ascii" standalone="no"?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="909px" preserveAspectRatio="none" style="width:328px;height:909px;background:#FFFFFF;" version="1.1" viewBox="0 0 328 909" width="328px" zoomAndPan="magnify"><defs/><g><text fill="#000000" font-family="Segoe UI" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="285" x="20" y="35.1074">eMovieShop - CI/CD Workflow (high level)</text><ellipse cx="166.5" cy="59.6211" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#EBF5FB" height="35.9609" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:0.5;" width="216" x="58.5" y="89.6211"/><text fill="#000000" font-family="Segoe UI" font-size="12" lengthAdjust="spacing" textLength="196" x="68.5" y="112.5703">Developer pushes to a feature branch</text><rect fill="#EBF5FB" height="67.8828" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:0.5;" width="211" x="61" y="145.582"/><text fill="#000000" font-family="Segoe UI" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="85" x="71" y="168.5313">Feature Checks</text><text fill="#000000" font-family="Segoe UI" font-size="12" lengthAdjust="spacing" textLength="89" x="71" y="184.4922">build + unit tests</text><text fill="#000000" font-family="Segoe UI" font-size="12" lengthAdjust="spacing" textLength="191" x="71" y="200.4531">(on every push, any branch != main)</text><rect fill="#EBF5FB" height="35.9609" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:0.5;" width="169" x="82" y="233.4648"/><text fill="#000000" font-family="Segoe UI" font-size="12" lengthAdjust="spacing" textLength="149" x="92" y="256.4141">Developer opens PR to main</text><rect fill="#EBF5FB" height="115.7656" rx="12.5" ry="12.5" style="stroke:#2C3E50;stroke-width:0.5;" width="126" x="103.5" y="289.4258"/><text fill="#000000" font-family="Segoe UI" font-size="1